<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Générateur d'URL TNSI</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f9f9f9;
      padding: 2rem;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    label, select, input, button {
      display: block;
      width: 100%;
      margin-top: 1rem;
      padding: 0.6rem;
      font-size: 1rem;
    }
    #result {
      margin-top: 1.5rem;
      word-break: break-all;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <form id="tnsiForm">
      <label for="sessionInput">Session (ex: id:today)</label>
      <input type="text" id="sessionInput" name="session" placeholder="id:today">

      <label for="fontSelect">Choisir une police :</label>
      <select id="fontSelect" name="font">
        <option value="Default">Default</option>
        <option value="BakaTaida">BakaTaida</option>
        <option value="yunranofont">yunranofont</option>
      </select>

      <button type="submit">Générer le lien</button>
    </form>

    <div id="result"></div>
  </div>

  <script>
    const form = document.getElementById('tnsiForm');
    const result = document.getElementById('result');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const session = document.getElementById('sessionInput').value.trim();
      const font = document.getElementById('fontSelect').value;

      const baseUrl = "https://tifsec-nsi.rf.gd/TNSI/";
      const params = new URLSearchParams();

      if (session) {
        params.append("session", session);
      }
      if (font) {
        params.append("font", font);
      }

      const fullUrl = `${baseUrl}?${params.toString()}`;
      result.textContent = fullUrl;
      result.style.color = "blue";
    });
  </script>
</body>
</html>
