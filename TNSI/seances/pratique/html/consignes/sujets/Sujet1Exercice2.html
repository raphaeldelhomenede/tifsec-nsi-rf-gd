<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image en Iframe Responsive</title>
  <style>
    .responsive-iframe {
      position: relative;
      padding-bottom: 56.25%; /* Ratio 16:9 */
      height: 0;
      overflow: hidden;
      max-width: 100%;
      border: 1px solid #ccc;
    }

    .responsive-iframe iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <h1>Image affichée via iframe</h1>
  <div class="responsive-iframe">
    <iframe
      src="https://web.archive.org/web/20250330003636if_/https://tifsec.github.io/TNSI/pratique/1-2.png"
      loading="lazy"
      allowfullscreen
    ></iframe>
  </div>
</body>
</html>
