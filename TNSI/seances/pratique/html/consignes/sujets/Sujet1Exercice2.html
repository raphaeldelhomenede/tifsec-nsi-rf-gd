<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Responsive</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
      background-color: #f9f9f9;
    }

    .image-container {
      max-width: 100%;
      text-align: center;
    }

    .image-container img {
      width: 100%;
      height: auto;
      max-width: 100%;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Image Responsive</h1>
  <div class="image-container">
    <img src="https://web.archive.org/web/20250330003636if_/https://tifsec.github.io/TNSI/pratique/1-2.png" alt="Exercice TNSI" />
  </div>
</body>
</html>
