<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Code Fibonacci</title>
  <style>
    body {
      background-color: #1e1e1e;
      color: #dcdcdc;
      font-family: Consolas, monospace;
      padding: 20px;
    }
    .code-box {
      background-color: #2d2d2d;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #444;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      white-space: pre;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="code-box">
def fibonacci(n):<br>
&nbsp;&nbsp;&nbsp;&nbsp;if n &lt; 3:<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return 1<br>
&nbsp;&nbsp;&nbsp;&nbsp;else:<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return fibonacci(n - 1) + fibonacci(n - 2)<br><br>
print(fibonacci(25))
  </div>
</body>
</html>
