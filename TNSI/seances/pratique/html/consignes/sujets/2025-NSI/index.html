<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Exercices NSI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f4f4f4;
    }
    .exercice {
      background-color: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }
    iframe {
      width: 100%;
      height: 500px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    .liens {
      margin-top: 10px;
    }
    a {
      color: #007BFF;
      text-decoration: none;
      display: block;
      margin-top: 5px;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Exercices NSI (01 à 48)</h1>
  <div id="contenu"></div>

  <script>
    const container = document.getElementById("contenu");

    for (let i = 1; i <= 48; i++) {
      const num = i.toString().padStart(2, '0');
      const version = i % 2 === 0 ? 2 : 1;
      const pdfFile = `25-NSI-${version}.pdf`;
      const pyFile = `25-NSI-${version}.py`;
      const correctionFile = `corrige/exercice${version}.html`; // global correction folder

      const exerciceDiv = document.createElement("div");
      exerciceDiv.className = "exercice";
      exerciceDiv.innerHTML = `
        <h2>Exercice ${num}</h2>
        <iframe src="${num}/${pdfFile}"></iframe>
        <div class="liens">
          🔗 <a href="${num}/${pyFile}" target="_blank">Télécharger le fichier Python</a>
          ✅ <a href="${correctionFile}">Voir le corrigé</a>
        </div>
      `;
      container.appendChild(exerciceDiv);
    }
  </script>
</body>
</html>
