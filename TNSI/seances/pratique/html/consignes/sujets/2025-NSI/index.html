<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Sujets NSI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f9f9f9;
    }
    .sujet {
      background-color: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      margin-bottom: 40px;
    }
    h2 {
      margin-bottom: 10px;
    }
    iframe {
      width: 100%;
      height: 400px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    .exercice {
      margin-top: 20px;
    }
    .liens {
      margin-top: 8px;
    }
    a {
      color: #007BFF;
      text-decoration: none;
      margin-right: 15px;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Sujets NSI - 48 Sujets, 2 exercices chacun</h1>
  <div id="contenu"></div>

  <script>
    const container = document.getElementById("contenu");
  
    for (let i = 1; i <= 48; i++) {
      const num = i.toString().padStart(2, '0');
      const sujetDiv = document.createElement("div");
      sujetDiv.className = "sujet";
      sujetDiv.innerHTML = `<h2>Sujet ${num}</h2>`;
  
      const exoDiv = document.createElement("div");
      exoDiv.className = "exercice";
      exoDiv.innerHTML = `
        <iframe src="${num}/25-NSI-${i}.pdf"></iframe>
        <div class="liens">
          🔗 <a href="${num}/25-NSI-${i}.py" target="_blank">Télécharger le fichier Python</a>
          ✅ <a href="corrige/exercice1.html">Voir le corrigé de l'exercice 1</a>
          ✅ <a href="corrige/exercice2.html">Voir le corrigé de l'exercice 2</a>
        </div>
      `;
      sujetDiv.appendChild(exoDiv);
  
      container.appendChild(sujetDiv);
    }
  </script>  
</body>
</html>
