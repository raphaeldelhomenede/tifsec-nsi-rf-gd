<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title id="dynamic-title">Correction</title>
</head>
<body>
    <h1>Correction Sujet <span id="number-du-sujet"></span> - Exercice <span id="number-du-exercice"></span></h1>
    
    <pre><code id="code-python">
        
    </code></pre>

    <a id="lien-py" href=""><span id="numberDuTruc"></span>.py</a>
    <br><span id="number-du-path"></span>
    <script src="https://raphaeldelhomenede.github.io/tifsec-nsi-rf-gd/TNSI/seances/pratique/html/consignes/sujets/2025-NSI/JavaScript.js"></script>
    <script>
        const fichierHtml = window.location.pathname.split('/').pop();
        const baseFilename = fichierHtml.replace('.html', '');
        const pyUrl = baseFilename + '.py';
        
        fetch(pyUrl)
            .then(response => response.text())
            .then(code => {
                document.getElementById('code-python').innerText = code;
            })
            .catch(error => {
                document.getElementById('code-python').innerText = "Erreur de chargement du code.";
                console.error("Erreur lors du chargement du fichier Python :", error);
            });
    </script>
</body>
</html>
